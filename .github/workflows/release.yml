name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: kolshek-windows-x64.exe
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: kolshek-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: kolshek-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: kolshek-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: kolshek-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun build ./src/cli/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "KolShek ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
