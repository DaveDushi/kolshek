name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: kolshek-windows-x64.exe
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: kolshek-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: kolshek-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: kolshek-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: kolshek-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Run tests and type check
        run: |
          bun run typecheck
          bun test

      - name: Build SPA and generate embedded files
        run: |
          bun run build:web
          bun scripts/generate-web-embed.ts
          bun scripts/generate-plugin-embed.ts

      - run: bun build ./src/cli/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
            echo "$(cat "${f}.sha256")"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            gh release create ${{ github.ref_name }} \
              --title "KolShek ${{ github.ref_name }}" \
              --notes-file RELEASE_NOTES.md \
              artifacts/*
          else
            gh release create ${{ github.ref_name }} \
              --title "KolShek ${{ github.ref_name }}" \
              --generate-notes \
              artifacts/*
          fi
